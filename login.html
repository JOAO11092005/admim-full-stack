<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acesso Espacial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #000000; /* Fundo principal preto absoluto */
            --surface-color: #0a0a0a; /* Fundo do formulário levemente cinza para destacar */
            --text-main: #ffffff; /* Texto branco */
            --text-muted: #888888; /* Texto secundário cinza */
            --border-color: #333333; /* Bordas escuras */
            --border-focus: #ffffff; /* Borda branca ao clicar */
            --btn-bg: #000000; /* Botão preto */
            --btn-border: #444444; /* Borda inicial do botão */
            --error-color: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fundo sutil simulando o espaço profundo */
            background-image: radial-gradient(circle at 50% 0%, #111111 0%, #000000 70%);
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 4px; /* Bordas menos arredondadas, mais sérias */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .image-panel {
            flex: 1;
            /* Imagem com tema Starlink / Satélite / Espaço Escuro */
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Sobreposição escura na imagem para não ofuscar o preto */
        .image-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.3), var(--surface-color));
        }

        .form-panel {
            flex: 1.2;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }

        .form-header h1 {
            font-size: 2em;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 0.95em;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            color: var(--text-main);
            font-size: 1em;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            margin-bottom: 35px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Estilizando o checkbox para ficar escuro */
        .checkbox-group input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            background-color: var(--bg-color);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--text-main);
            border-color: var(--text-main);
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: var(--bg-color);
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .form-options a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .form-options a:hover {
            color: var(--text-main);
        }

        /* Botão Preto com efeitos premium */
        .login-button {
            width: 100%;
            padding: 15px 20px;
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--btn-border);
            border-radius: 2px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-button:hover:not(:disabled) {
            border-color: var(--text-main);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .login-button:disabled {
            color: #555;
            border-color: #222;
            cursor: not-allowed;
        }

        #error-message {
            color: var(--error-color);
            margin-top: 20px;
            font-size: 0.9em;
            font-weight: 400;
            min-height: 1.2em;
            text-align: center;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .image-panel {
                display: none;
            }
            .form-panel {
                padding: 40px 30px;
            }
            .login-wrapper {
                flex-direction: column;
                min-height: auto;
                max-width: 450px;
                border: none;
                border-top: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="image-panel"></div>
        <div class="form-panel">
            <div class="form-header">
                <h1>Acesso ao Sistema</h1>
                <p>Insira suas credenciais para continuar.</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" id="toggle-password" title="Mostrar senha"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-group" for="remember-me">
                        <input type="checkbox" id="remember-me">
                        Lembrar-me
                    </label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" id="login-button" class="login-button">
                    <span id="button-text">Entrar</span>
                    <i id="button-icon"></i>
                </button>
            </form>
            <p id="error-message"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA9UUXIt6psEnOluZg530YBqE35Nkzlp0Y",
            authDomain: "finamceiro-5d9ae.firebaseapp.com",
            databaseURL: "https://finamceiro-5d9ae-default-rtdb.firebaseio.com",
            projectId: "finamceiro-5d9ae",
            storageBucket: "finamceiro-5d9ae.appspot.com",
            messagingSenderId: "90531422877",
            appId: "1:90531422877:web:0b9fee54c03ba81d68aa74"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // Elementos do DOM
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessageElement = document.getElementById('error-message');
        const loginButton = document.getElementById('login-button');
        const buttonText = document.getElementById('button-text');
        const buttonIcon = document.getElementById('button-icon');
        const togglePassword = document.getElementById('toggle-password');
        const rememberMe = document.getElementById('remember-me');

        // Lógica para Mostrar/Ocultar Senha
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        // Verifica se o usuário já está logado
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.replace('admin.html');
            }
        });

        // Evento de envio do formulário
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorMessageElement.textContent = '';
            
            // Estado de carregamento do botão
            loginButton.disabled = true;
            buttonText.textContent = 'Autenticando...';
            buttonIcon.className = 'fas fa-spinner fa-spin';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                // Configura a persistência baseada no checkbox "Lembrar-me"
                const persistenceType = rememberMe.checked 
                    ? firebase.auth.Auth.Persistence.LOCAL 
                    : firebase.auth.Auth.Persistence.SESSION;
                
                await auth.setPersistence(persistenceType);
                
                // Realiza o login
                await auth.signInWithEmailAndPassword(email, password);
                // O redirecionamento é feito no onAuthStateChanged logo acima
                
            } catch (error) {
                let friendlyMessage = "Acesso negado. Verifique suas credenciais.";

                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    friendlyMessage = "Email ou senha incorretos.";
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMessage = "Formato de email inválido.";
                } else if (error.code === 'auth/too-many-requests') {
                    friendlyMessage = "Muitas tentativas. Tente novamente mais tarde.";
                }
                
                errorMessageElement.textContent = friendlyMessage;

                // Restaura o botão
                loginButton.disabled = false;
                buttonText.textContent = 'Entrar';
                buttonIcon.className = '';
            }
        });
    </script>
</body>
</html>
